# OSRS GE Terminal — always-on stack for a VPS.
#   api       serves the dashboard + REST API (internal only; Caddy fronts it)
#   collector polls the OSRS API every 5 min, 24/7
#   caddy     HTTPS + login in front of the API
# All three share one DuckDB file via the `data` volume.
# Secrets come from the .env file (env_file) — values are passed literally, so
# the bcrypt hash needs NO escaping.

# Cap container logs so a 24/7 collector can never fill the disk.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  api:
    build: .
    image: osrs-ge-terminal:latest
    env_file:
      - .env
    volumes:
      - data:/app/data
    expose:
      - "8000"
    healthcheck:
      # DB-free liveness probe — confirms uvicorn is serving (won't false-fail on a DB write-lock)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/healthz', timeout=5)"]
      interval: 30s
      timeout: 8s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    logging: *default-logging

  collector:
    image: osrs-ge-terminal:latest
    depends_on:
      api:
        condition: service_healthy
    command: python -m app.collector
    env_file:
      - .env
    volumes:
      - data:/app/data
    restart: unless-stopped
    logging: *default-logging

  caddy:
    image: caddy:2
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    logging: *default-logging

volumes:
  data:
  caddy_data:
  caddy_config:
